# nginx HTTPS example config
# Copy this to /etc/nginx/sites-available/switch_monitor
# or merge into your existing config
#
# Certificate paths (generated by setup_https_mkcert.sh):
#   ssl_certificate     PROJECT_ROOT/certs/monitor.switch.test.pem;
#   ssl_certificate_key PROJECT_ROOT/certs/monitor.switch.test-key.pem;
# Replace PROJECT_ROOT with your project absolute path (e.g. /home/wner/switch)

server {
    listen 80;
    server_name monitor.switch.test;
    # Optional: redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name monitor.switch.test;

    # SSL certificates (from mkcert)
    ssl_certificate     /path/to/switch/certs/monitor.switch.test.pem;
    ssl_certificate_key /path/to/switch/certs/monitor.switch.test-key.pem;

    # Recommended SSL settings (optional, improves security)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
